<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <circle cx="100" cy="100" r="100" fill="#1a1a2e"/>
  <circle cx="100" cy="100" r="96" fill="url(#gradHarman)"/>
  <!-- Long hair back -->
  <path d="M45 95c0-36 24-60 55-60s55 24 55 60c0 0-3 70-10 85H55c-7-15-10-85-10-85z" fill="#1a0a04"/>
  <!-- Middle part bangs -->
  <path d="M58 72c4-20 20-32 42-32s38 12 42 32c-6-10-20-16-42-16s-36 6-42 16z" fill="#1a0a04"/>
  <!-- Long side hair waves -->
  <path d="M48 90c-5 28-3 55 5 75" stroke="#1a0a04" stroke-width="22" stroke-linecap="round" fill="none"/>
  <path d="M152 90c5 28 3 55-5 75" stroke="#1a0a04" stroke-width="22" stroke-linecap="round" fill="none"/>
  <!-- Hair highlights -->
  <path d="M60 105c-2 18 0 35 4 50" stroke="#3a1810" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M140 105c2 18 0 35-4 50" stroke="#3a1810" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
  <!-- Face -->
  <ellipse cx="100" cy="98" rx="32" ry="36" fill="#e8bc95"/>
  <!-- Bindi (Indian feminine signal) -->
  <circle cx="100" cy="74" r="2.5" fill="#c4485a"/>
  <!-- Eyes - larger, feminine -->
  <ellipse cx="87" cy="93" rx="4.5" ry="5.5" fill="#1a1a1a"/>
  <ellipse cx="113" cy="93" rx="4.5" ry="5.5" fill="#1a1a1a"/>
  <circle cx="88.5" cy="92" r="2" fill="white"/>
  <circle cx="114.5" cy="92" r="2" fill="white"/>
  <!-- Long eyelashes -->
  <path d="M80 87c-2-4-1-6 2-7" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M83 85c-1-4 0-6 3-6" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M86 84c0-3 1-5 3-5" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M120 87c2-4 1-6-2-7" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M117 85c1-4 0-6-3-6" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M114 84c0-3-1-5-3-5" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Arched eyebrows feminine -->
  <path d="M79 82c4-5 10-5 13-2" stroke="#1a0a04" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M108 80c3-3 9-3 13 2" stroke="#1a0a04" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Cheek blush -->
  <circle cx="76" cy="108" r="7" fill="#ff7a90" opacity="0.3"/>
  <circle cx="124" cy="108" r="7" fill="#ff7a90" opacity="0.3"/>
  <!-- Full lipstick lips -->
  <path d="M90 110c3 6 17 6 20 0" stroke="#c4304a" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M92 111c2 4 14 4 16 0" fill="#c4304a" opacity="0.6"/>
  <!-- Small nose ring hint -->
  <circle cx="94" cy="103" r="1" fill="#d4a020" opacity="0.9"/>
  <!-- Top -->
  <path d="M55 148c0-15 20-22 45-22s45 7 45 22v52H55v-52z" fill="#d4485a"/>
  <!-- V-neckline -->
  <path d="M82 126l18 14 18-14" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="1"/>
  <!-- Dupatta/scarf edge -->
  <path d="M55 155c15-4 35-4 45-4s30 0 45 4" stroke="#ffd700" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Jhumka earrings (traditional Indian drop earrings) -->
  <circle cx="63" cy="108" r="2.5" fill="#ffd700"/>
  <path d="M63 111l-3 6 3 2 3-2z" fill="#ffd700"/>
  <circle cx="63" cy="119" r="2" fill="#ffd700"/>
  <circle cx="137" cy="108" r="2.5" fill="#ffd700"/>
  <path d="M137 111l-3 6 3 2 3-2z" fill="#ffd700"/>
  <circle cx="137" cy="119" r="2" fill="#ffd700"/>
  <defs>
    <radialGradient id="gradHarman" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a2a4a"/>
      <stop offset="100%" stop-color="#0f0f1e"/>
